<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Nail Siha</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="setup-guide" class="card" style="display:none;">
        <h2>مرحباً بك في Nail Siha 💊</h2>
        <p>لضمان أن يرن التطبيق في موعده، يرجى القيام بالتالي:</p>
        <ol style="text-align: right;">
            <li>اضغط على زر <b>"تفعيل التنبيهات"</b> بالأسفل.</li>
            <li>اذهب لإعدادات البطارية في هاتفك واختر <b>"عدم تقييد" (Unrestricted)</b> لهذا التطبيق.</li>
        </ol>
        <button onclick="requestPermissions()">تفعيل التنبيهات والمتابعة</button>
    </div>

    <div id="main-app" class="card">
        <h1>Nail Siha 💊</h1>
        <input type="text" id="medName" placeholder="اسم الدواء">
        <input type="time" id="medTime">
        <button onclick="addMed()">إضافة الدواء</button>
        <div id="list"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
